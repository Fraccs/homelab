---
crds:
  install: true # -- Install and upgrade CRDs
  keep: false # -- Keep CRDs on chart uninstall

global:
  domain: argocd.k3s-prod-a.47fc5c.com
  image:
    repository: quay.io/argoproj/argocd
    tag: "v2.14.4@sha256:bf7ad407274f0e860ca7baefc37af19a31cc13da2f770180a1df2319da32d345"
    imagePullPolicy: IfNotPresent
  tls:
    create: false

dex:
  enabled: false

controller:
  name: application-controller
  replicas: 1
  metrics:
    enabled: true

redis:
  enabled: false

externalRedis:
  host: "redis.redis.svc.cluster.local"
  port: 6379

redisSecretInit:
  enabled: false

configs:
  params:
    server.insecure: true

server:
  name: server
  replicas: 1
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  metrics:
    enabled: true

repoServer:
  name: repo-server
  replicas: 1
  metrics:
    enabled: true

applicationSet:
  name: applicationset-controller
  replicas: 1
  metrics:
    enabled: true
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

notifications:
  enabled: false
