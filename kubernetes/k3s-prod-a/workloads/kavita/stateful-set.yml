---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kavita
  namespace: kavita
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kavita
  template:
    metadata:
      labels:
        app: kavita
    spec:
      containers:
        - name: kavita
          image: docker.io/jvmilazz0/kavita:0.8.5@sha256:b00fe20c615d6789a0361fccb01de0d8f8d7097964aa05949ecb98cdecf983e2
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: kavita-books
              mountPath: /books
            - name: kavita-data
              mountPath: /kavita/config
          envFrom:
            - configMapRef:
                name: kavita
      volumes:
        - name: kavita-books
          persistentVolumeClaim:
            claimName: kavita-books
        - name: kavita-data
          persistentVolumeClaim:
            claimName: kavita-data
